<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeyframe Works - Em Construção</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --muted: #666;
      --accent: #f2b705;
      --card: rgba(255,255,255,0.8);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --text: #f5f5f5;
        --muted: #aaa;
        --card: rgba(20,20,20,0.6);
      }
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(242,183,5,0.15),
        transparent
      );
      background-size: 400% 400%;
      animation: moveBg 14s ease infinite;
      z-index: -1;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      50% { transform: translate(5%,5%); }
      100% { transform: translate(0,0); }
    }

    .container {
      max-width: 600px;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      height: 90px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 44px;
      font-weight: bold;
      letter-spacing: 2px;
      margin: 0;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-top: 10px;
    }

    .tagline {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .card {
      margin-top: 25px;
      padding: 15px;
      background: var(--card);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #111;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.svg" class="logo" alt="Honeyframe Works Logo">

    <div class="title">EM CONSTRUÇÃO</div>

    <div class="subtitle">Honeyframe Works</div>

    <div class="tagline">
      Soluções de software — ferramentas digitais simples, úteis e focadas em eficiência.
    </div>

    <!-- FORMULÁRIO -->
    <div class="card">
      <form onsubmit="sendMail(event)">
        <input type="text" id="name" placeholder="Nome" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" rows="4" placeholder="Mensagem" required></textarea>
        <button type="submit">Contactar</button>
      </form>
    </div>

  </div>

  <script>
    function sendMail(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const subject = "Contacto via site - Honeyframe Works";
      const body =
        `Nome: ${name}%0D%0A` +
        `Email: ${email}%0D%0A%0D%0A` +
        `${message}`;

      window.location.href =
        `mailto:honeyframeworks@protonmail.com?subject=${subject}&body=${body}`;
    }
  </script>

</body>
</html>
