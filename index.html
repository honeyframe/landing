<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Construção</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background: #ffffff;
      color: #111;
    }

    .logo {
      height: 90px;
      margin-bottom: 25px;
    }

    .title {
      font-size: 44px;
      font-weight: bold;
      letter-spacing: 2px;
      margin: 0;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-top: 12px;
      line-height: 1.4;
    }

    .tagline {
      font-size: 14px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div>
    <img src="logo.png" alt="Logo" class="logo">

    <div class="title">EM CONSTRUÇÃO</div>

    <div class="subtitle">
      Soluções de software
    </div>

    <div class="tagline">
      Desenvolvimento de ferramentas digitais simples, úteis e focadas em eficiência.
    </div>
  </div>

</body>
</html>
